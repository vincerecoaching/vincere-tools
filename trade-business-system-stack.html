  <script type="text/babel">
    const { useState } = React;

const ORANGE = "#E85C2B";

const PILLARS = [
  {
    id: "p1", name: "Marketing & Lead Generation", icon: "📣", color: "#E85C2B",
    systems: [
      { id:"s1", num:1, name:"Lead Tracking System", tagline:"Ensure every enquiry is recorded and followed up",
        why:"Most trade businesses lose leads before they get a chance to quote. Without a system, enquiries fall through the cracks, phone calls go unrecorded, and referral sources are never measured. A lead tracking system turns random incoming calls into a managed pipeline you can see, measure, and improve.",
        process:["Capture every phone lead with name, date, source, and outcome","Record website enquiries in a central log or CRM","Tag every lead with its referral source","Track quote conversion rate weekly","Review lead volume and source monthly"],
        checklist:["Phone leads captured in system","Website leads connected to CRM","Referral sources tagged on every lead","Conversion rates tracked weekly","Weekly lead report reviewed"],
        automations:["WildJar call tracking","Google Forms to CRM","ServiceM8 lead capture","HubSpot free CRM"],
        fields:[{l:"Tool used to track leads",p:"e.g. ServiceM8, Tradify, spreadsheet"},{l:"Current monthly lead volume",p:"e.g. 40 leads per month"},{l:"Current conversion rate",p:"e.g. 60%"},{l:"Biggest lead source right now",p:"e.g. Google, referrals, repeat customers"}],
        rule:null },
      { id:"s2", num:2, name:"Google Reviews System", tagline:"Systematically generate 5-star reviews after every job",
        why:"Google reviews are one of the highest-leverage marketing activities a trade business can do. A business with 80+ reviews at 4.8 stars wins jobs before a competitor even picks up the phone. Most tradies only ask when they remember — this system makes it automatic every single time.",
        process:["Confirm job is complete and customer is satisfied","Send review request via SMS within 24 hours of completion","Use a direct Google review link — no searching required","Follow up once after 48 hours if no review received","Respond to every review publicly within 48 hours"],
        checklist:["Direct Google review link created and saved","Review request sent same day as completion","48-hour follow up scheduled","All reviews responded to within 48 hours","Monthly review count tracked"],
        automations:["ServiceM8 review automation","SMS review link","Zapier job complete to SMS","Google Business Profile"],
        fields:[{l:"Your Google review link",p:"https://g.page/r/..."},{l:"Current review count",p:"e.g. 24 reviews"},{l:"Current rating",p:"e.g. 4.7 stars"},{l:"Monthly review target",p:"e.g. 8 new reviews per month"}],
        rule:null },
      { id:"s3", num:3, name:"Referral System", tagline:"Turn happy customers into a consistent source of new work",
        why:"A referred customer costs almost nothing to acquire, converts at a higher rate, and stays longer. Most trades get referrals but do nothing to systematise them. A formal referral system doubles or triples referrals by making the ask consistent and rewarding it properly.",
        process:["Identify satisfied customers at job completion","Make the referral ask in person during customer walkthrough","Follow up with a referral request via SMS","Send the referral incentive immediately when a referral converts","Track all referral sources monthly"],
        checklist:["Referral ask scripted and trained with team","Referral incentive decided and communicated","Referral tracking in place","Thank-you process for referrers","Monthly referral review completed"],
        automations:["CRM referral tagging","Automated thank-you SMS","Gift card delivery via Prezzee","Monthly referral report"],
        fields:[{l:"Your referral incentive offer",p:"e.g. $50 gift card for a referred job that completes"},{l:"How you currently ask for referrals",p:"e.g. verbally at job end, via SMS, never"},{l:"Average referrals per month",p:"e.g. 3-4"},{l:"Referral target per month",p:"e.g. 10"}],
        rule:null },
      { id:"s4", num:4, name:"Builder Relationship System", tagline:"Manage and grow your most valuable trade relationships",
        why:"Builders represent high-volume, repeat work. One solid builder relationship can provide 30-50% of a trade business revenue. Without a structured system these relationships are managed inconsistently. This system puts builder relationships on a calendar and treats them like the asset they are.",
        process:["Build and maintain a master builder contact list","Schedule quarterly check-in calls for top-tier builders","Review pricing and terms annually with each builder","Track active projects and upcoming pipeline per builder","Send an annual acknowledgement to top builders"],
        checklist:["Builder contact list created and current","Tiered A/B/C by revenue value","Quarterly check-in scheduled for A-tier","Pricing reviewed annually","Project pipeline tracked per builder","Annual acknowledgement sent"],
        automations:["CRM contact management","Calendar reminders for check-ins","Pipeline tracking in job software"],
        fields:[{l:"Number of active builders you work with",p:"e.g. 8 builders"},{l:"Top 3 builders by revenue",p:"e.g. ABC Constructions, Smith Builders"},{l:"How often you currently check in",p:"e.g. only when they call, monthly, quarterly"},{l:"Builder check-in method",p:"e.g. phone call, coffee, email update"}],
        rule:null },
      { id:"s5", num:5, name:"Local Awareness Marketing System", tagline:"Build brand presence in your local service area",
        why:"Local brand awareness is the compound interest of marketing. Most trade businesses rely entirely on Google for new leads — but when neighbours recognise your van or find your flyer, the cost per lead drops to near zero. This system creates a consistent local presence that builds trust before a customer ever makes contact.",
        process:["Define your primary service area by suburb radius","Choose 2-3 local awareness channels that fit your business","Execute each channel on a quarterly schedule","Track which activities drive enquiries","Review and adjust quarterly"],
        checklist:["Service area map defined","Vehicle signage in place","Local Facebook group presence active","Quarterly letterbox drop scheduled","Local sponsorship or partnership identified","Enquiries from awareness tracked"],
        automations:["Facebook Business page scheduling","Canva for flyer design","Local Facebook group posting calendar"],
        fields:[{l:"Primary service suburbs",p:"e.g. Mitcham, Nunawading, Ringwood"},{l:"Current local marketing activities",p:"e.g. vehicle wrap, letterbox drops, nothing"},{l:"Best-performing local channel",p:"e.g. Facebook community groups"},{l:"Local awareness budget monthly",p:"e.g. $200/month"}],
        rule:null },
    ]
  },
  {
    id: "p2", name: "Sales & Quoting", icon: "📋", color: "#4A9EDB",
    systems: [
      { id:"s6", num:6, name:"Enquiry Handling System", tagline:"Handle every enquiry professionally and capture every detail",
        why:"The first impression of your business is almost always a phone call. How it is answered determines whether that person becomes a customer or calls the next tradie. Most trade businesses have no standard script and no follow-up system. This system fixes that.",
        process:["Answer every call within 3 rings or return missed calls within 30 minutes","Use a standard greeting with your business name","Capture customer name, number, address, and job description","Confirm next step: site visit, quote, or booking","Enter enquiry into job software before call ends"],
        checklist:["Standard phone greeting scripted and trained","Call script includes all capture fields","Missed call return-call system in place","Every enquiry entered into system same day","Team trained on handling process"],
        automations:["WildJar missed call tracking","ServiceM8 new job creation","CRM auto-entry from web forms"],
        fields:[{l:"Your current phone greeting",p:"e.g. Good morning, Smith Electrical, Kirk speaking"},{l:"Who answers the phone",p:"e.g. office manager, owner, anyone"},{l:"How missed calls are handled",p:"e.g. voicemail only, returned next day"},{l:"Software used to record enquiries",p:"e.g. ServiceM8, Tradify, spreadsheet"}],
        rule:null },
      { id:"s7", num:7, name:"Qualification System", tagline:"Filter your leads to protect your quoting time",
        why:"Quoting costs time and money. A tradesperson who quotes every job that comes in is burning hours on work they will never win. A qualification system asks the right questions upfront to determine if a job is worth pursuing — protecting your margins and your time.",

function Ring({ pct, color, size = 52, stroke = 4 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (circ * pct / 100);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={offset} transform={`rotate(-90 ${size/2} ${size/2})`} />
      <text x={size/2} y={size/2} fill="white" fontSize={size < 40 ? 9 : 10} fontWeight="700"
        textAnchor="middle" dominantBaseline="middle" fontFamily="system-ui,sans-serif">{pct}%</text>
    </svg>
  );
}

        <div style={s.logo}>
          <img src="" id="vincere-logo-img" alt="Vincere Coaching" style={{ height: 48, width: "auto", display: "block" }} />
          <div style={s.logoText}>
            Trade Business System Stack
            <div style={s.logoSub}>Base Build — Vincere Coaching</div>
          </div>
        </div>
        <div style={s.headerRight}>
          <div style={s.pctText}><span style={s.pctNum}>{overallPct}%</span> Complete</div>
          {view === "pillar" && <button style={s.btn} onClick={goHome}>← Dashboard</button>}
        </div>
      </div>

      {view === "dash" && (
        <div style={s.dash}>
          <div style={s.hero}>
            <h1 style={s.h1}>Your <span style={{ color: ORANGE }}>Business</span> Operating System</h1>
            <p style={s.heroSub}>30 systems across 6 pillars. Build each one to run a trade business that works without you.</p>
            <div style={s.statsRow}>
              {[["Systems Live", totals.live], ["In Progress", totals.prog], ["Remaining", 30 - totals.live - totals.prog], ["Total Systems", 30]].map(([lbl, num]) => (
                <div key={lbl}>
                  <div style={s.statNum}>{num}</div>
                  <div style={s.statLbl}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={s.grid}>
            {PILLARS.map(p => {
              const r = calcPillar(p);
              const pct = Math.round(((r.live + r.prog * 0.5) / r.total) * 100);
              return (
                <div key={p.id} style={s.card} onClick={() => openPillar(p)}
                  onMouseEnter={e => e.currentTarget.style.transform = "translateY(-4px)"}
                  onMouseLeave={e => e.currentTarget.style.transform = "none"}>
                  <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: p.color }} />
                  <div style={s.cardTop}>
                    <div>
                      <div style={{ ...s.pillarName, color: p.color }}>{p.icon} {p.name}</div>
                      <div style={s.pillarCount}>{r.total} Systems — {r.live} Live, {r.prog} In Progress</div>
                    </div>
                    <Ring pct={pct} color={p.color} />
                  </div>
                  <div style={s.sysItems}>
                    {p.systems.map(sys => {
                      const st = getSys(sys.id).status;
                      return (
                        <div key={sys.id} style={s.sysItem}>
                          <div style={{ ...s.dot, background: st === "lv" ? "#4CAF50" : st === "pr" ? "#F5A623" : "rgba(255,255,255,0.15)" }} />
                          <span>{sys.name}</span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ ...s.cta, color: p.color }}>Open Pillar →</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view === "pillar" && activePillar && (() => {
        const p = activePillar;
        const r = calcPillar(p);
        const pct = Math.round(((r.live + r.prog * 0.5) / r.total) * 100);
        return (
          <div style={s.pillarView}>
            <div style={s.pvHeader}>
              <div style={{ fontSize: 36 }}>{p.icon}</div>
              <div>
                <div style={{ ...s.pvTitle, color: p.color }}>{p.name}</div>
                <div style={s.pvSub}>{r.total} Systems — {r.live} Live · {r.prog} In Progress · {r.total - r.live - r.prog} Not Started</div>
              </div>
              <div style={s.barWrap}>
                <div style={s.barLbl}>{pct}% Complete</div>
                <div style={s.barTrack}>
                  <div style={{ height: "100%", borderRadius: 3, background: p.color, width: `${pct}%`, transition: "width 0.5s" }} />
                </div>
              </div>
            </div>
            <div style={s.sysList}>
              {p.systems.map(sys => {
                const ss = getSys(sys.id);
                return (
                  <SystemCard key={sys.id} sys={sys} color={p.color}
                    checks={ss.checks} fields={ss.fields} notes={ss.notes} status={ss.status}
                    onCheck={(i, v) => updateSys(sys.id, { checks: { ...ss.checks, [i]: v } })}
                    onField={(i, v) => updateSys(sys.id, { fields: { ...ss.fields, [i]: v } })}
                    onNote={(v) => updateSys(sys.id, { notes: v })}
                    onStatus={(v) => updateSys(sys.id, { status: v })}
                  />
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    // Set logo src after React mounts
    setTimeout(function() {
      var meta = document.getElementById('logo-data');
      var img = document.getElementById('vincere-logo-img');
      if (meta && img) img.src = meta.getAttribute('content');
    }, 500);
  </script>
</body>
</html>
